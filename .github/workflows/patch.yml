name: Auto-Patch SuSFS to Kernel

on:
  workflow_dispatch:

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone your Kernel
        run: |
          # Клонируем твое ядро, используя токен для доступа
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/palazik/kernel_xiaomi_mars.git -b twelve kernel_repo

      - name: Clone SuSFS
        run: |
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-5.4 susfs_repo

      - name: Apply Patch and Capture Conflicts
        working-directory: kernel_repo
        run: |
          # Пытаемся наложить патч. 
          # Ставим || true, чтобы экшен не остановился при появлении конфликтов
          patch -p1 < ../susfs_repo/kernel_patches/50_add_susfs_in_kernel-5.4.patch || true

      - name: Push results to new branch
        working-directory: kernel_repo
        run: |
          # Создаем новую ветку для грязного патча
          git checkout -b susfs-test-branch
          git add .
          # Коммитим всё, включая сгенерированные .rej файлы
          git commit -m "Auto-applied SuSFS patch (contains .rej conflicts)" || echo "No changes to commit"
          # Пушим обратно в твой репозиторий
          git push -u origin susfs-test-branch
          
